<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price List</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border: 1px solid #dddddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Price List</h1>
    <table>
        <tr>
            <th>Service</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Lastik Şişirme</td>
            <td>10₺</td>
        </tr>
        <tr>
            <td>Yağ Değişimi</td>
            <td>400₺</td>
        </tr>
        <tr>
            <td>Motul Yağ Değişimi</td>
            <td>800₺</td>
        </tr>
        <tr>
            <td>Şamyel Değişim</td>
            <td>500₺</td>
        </tr>
        <tr>
            <td>Lastik Yama</td>
            <td>200₺</td>
        </tr>
    </table>
</body>
</html>
